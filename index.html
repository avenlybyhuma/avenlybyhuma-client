<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenly by Huma | Sustainable Luxury Bedding</title>
  <!-- Favicon -->
  <link rel="icon" href="/favico.png" type="image/png">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2C3E50', // Deep Slate
            secondary: '#95A5A6', // Soft Grey
            accent: '#D4AC0D', // Muted Gold
            sand: '#F5F5F1', // Warm White
            stone: '#Eae7e0', // Light Beige
            sage: '#8F9779', // Muted Green
            earth: '#5D5C61', // Dark Grey
          },
          fontFamily: {
            sans: ['Arial', 'Helvetica', 'sans-serif'],
            serif: ['Arial', 'Helvetica', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    :root {
      --bg: #F5F5F1;
      --text: #2C3E50;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Soft Fade In */
    .fade-in {
      animation: fadeIn 0.8s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle Hover States */
    .hover-lift {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    ::selection {
      background: #8F9779;
      color: #fff;
    }

    /* Global Input Styles */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    input[type="number"],
    input[type="search"],
    textarea,
    select {
      border: 1px solid #95A5A6 !important;
      /* secondary grey */
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="tel"]:focus,
    input[type="number"]:focus,
    input[type="search"]:focus,
    textarea:focus,
    select:focus {
      border-color: #8F9779 !important;
      /* sage */
      box-shadow: 0 0 0 2px rgba(143, 151, 121, 0.2) !important;
      outline: none !important;
    }
  </style>
  <style>
    /* Instant Pre-loader Styles */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F5F5F1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    .loader-logo {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #2C3E50;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .loader-bar-container {
      width: 120px;
      height: 2px;
      background-color: rgba(44, 62, 80, 0.1);
      position: relative;
      overflow: hidden;
    }

    .loader-bar {
      position: absolute;
      width: 40%;
      height: 100%;
      background-color: #8F9779;
      animation: loading-bar 1.5s infinite ease-in-out;
    }

    @keyframes loading-bar {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    .fade-out {
      opacity: 0;
      visibility: hidden;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0"
      }
    }
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <!-- This preloader will be visible until React mounts -->
    <div id="preloader">
      <div class="loader-logo">AVENLY</div>
      <div class="loader-bar-container">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
