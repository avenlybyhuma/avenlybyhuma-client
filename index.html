<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenly by Huma | Sustainable Luxury Bedding</title>
  <!-- Favicon -->
  <link rel="icon" href="/favico.png" type="image/png">
  
  <style>
    :root {
      --bg: #F5F5F1;
      --text: #2C3E50;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
    }

    #preloader {
      position: fixed;
      inset: 0;
      background: #F5F5F1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .loader-text {
      font-size: 24px;
      letter-spacing: 0.3em;
      font-weight: 300;
      color: #2C3E50;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <div id="preloader">
      <div class="loader-text">AVENLY</div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
