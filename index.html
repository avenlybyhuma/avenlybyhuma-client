<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenly by Huma | Sustainable Luxury Bedding</title>
  <!-- Favicon -->
  <link rel="icon" href="/favico.png" type="image/png">
  
  <style>
    :root {
      --bg: #F5F5F1;
      --text: #2C3E50;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
    }

    #preloader {
      position: fixed;
      inset: 0;
      background-color: #F5F5F1;
      background-image: radial-gradient(rgba(0,0,0,0.01) 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .loader-text {
      font-size: 32px;
      letter-spacing: 0.5em;
      font-weight: 300;
      color: #2C3E50;
      text-transform: uppercase;
      margin-left: 0.5em; /* Offset for spacing */
      animation: textPulse 2.5s infinite ease-in-out;
    }

    .progress-wrapper {
      position: relative;
      width: 200px;
      height: 1px;
      background: rgba(44, 62, 80, 0.1);
      overflow: hidden;
    }

    .progress-shimmer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, 
        transparent 0%, 
        #8F9779 50%, 
        transparent 100%
      );
      animation: shimmerMove 1.8s infinite ease-in-out;
    }

    @keyframes textPulse {
      0%, 100% { opacity: 0.5; filter: blur(0px); }
      50% { opacity: 1; filter: blur(0.5px); }
    }

    @keyframes shimmerMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <div id="preloader">
      <div class="loader-content">
        <div class="loader-text">AVENLY</div>
        <div class="progress-wrapper">
          <div class="progress-shimmer"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
