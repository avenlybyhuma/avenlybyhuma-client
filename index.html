<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenly by Huma | Sustainable Luxury Bedding</title>
  <!-- Favicon -->
  <link rel="icon" href="/favico.png" type="image/png">
  <!-- Preload Critical Assets -->
  <link rel="preload" href="https://images.unsplash.com/photo-1595521624992-48a59d495e6d?q=80&w=2487&auto=format&fit=crop" as="image">

  <!-- Removed Tailwind CDN for performance (handled by Vite now) -->
  <style>
    :root {
      --bg: #F5F5F1;
      --text: #2C3E50;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Soft Fade In */
    .fade-in {
      animation: fadeIn 0.8s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle Hover States */
    .hover-lift {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    ::selection {
      background: #8F9779;
      color: #fff;
    }

    /* Global Input Styles */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    input[type="number"],
    input[type="search"],
    textarea,
    select {
      border: 1px solid #95A5A6 !important;
      /* secondary grey */
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="tel"]:focus,
    input[type="number"]:focus,
    input[type="search"]:focus,
    textarea:focus,
    select:focus {
      border-color: #8F9779 !important;
      /* sage */
      box-shadow: 0 0 0 2px rgba(143, 151, 121, 0.2) !important;
      outline: none !important;
    }
  </style>
  <style>
    /* High-Fidelity Shell Skeleton */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F5F5F1;
      z-index: 9999;
      display: block; /* Not centered anymore */
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    .skeleton-header {
      height: 90px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.03);
      background: #F5F5F1;
    }

    .skeleton-nav {
      display: flex;
      gap: 24px;
    }

    .skeleton-item {
      height: 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 4px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .skeleton-hero {
      width: 100%;
      height: 70vh;
      background: rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 64px;
      gap: 24px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 0.8; }
      100% { opacity: 0.5; }
    }

    .fade-out {
      opacity: 0;
      visibility: hidden;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root">
    <!-- This "App Shell" skeleton is visible instantly while JS loads -->
    <div id="preloader">
      <div class="skeleton-header">
        <div class="skeleton-nav">
          <div class="skeleton-item" style="width: 60px;"></div>
          <div class="skeleton-item" style="width: 80px;"></div>
        </div>
        <div class="skeleton-item" style="width: 120px; height: 24px; background: rgba(0,0,0,0.08);"></div>
        <div class="skeleton-nav">
          <div class="skeleton-item" style="width: 24px; height: 24px; border-radius: 50%;"></div>
          <div class="skeleton-item" style="width: 24px; height: 24px; border-radius: 50%;"></div>
        </div>
      </div>
      <div class="skeleton-hero">
        <div class="skeleton-item" style="width: 40%; height: 64px;"></div>
        <div class="skeleton-item" style="width: 20%; height: 16px;"></div>
        <div class="skeleton-item" style="width: 120px; height: 48px; border-radius: 30px; margin-top: 24px;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
